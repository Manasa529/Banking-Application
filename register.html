{% extends 'base.html' %}
{% load static %}

{% block title %}Register{% endblock %}

{% block content %}

<div style="max-width:500px; margin:60px auto; background:white; padding:50px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.2);">

<h2 style="text-align:center; margin-bottom:35px;">Create Account</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="name" placeholder="Full Name" required
style="width:100%; padding:14px; margin:12px 0; border:1px solid #ddd; border-radius:6px;">

<input type="email" name="email" placeholder="Email" required
style="width:100%; padding:14px; margin:12px 0; border:1px solid #ddd; border-radius:6px;">

<input type="password" name="password" placeholder="Password (min 6 characters)" required
style="width:100%; padding:14px; margin:12px 0; border:1px solid #ddd; border-radius:6px;">

<button type="submit"
style="width:100%; padding:14px; background:#28a745; color:white; border:none; border-radius:6px; font-size:17px; cursor:pointer; margin-top:15px;">
Register & Get $1000
</button>

</form>

<div style="text-align:center; color:#28a745; margin-top:18px;">
🎉 Get $1000 welcome bonus!
</div>

<p style="text-align:center; margin-top:25px;">
Already have an account?
<a href="/login/" style="color:#28a745;">Login here</a>
</p>

</div>

{% endblock %}
