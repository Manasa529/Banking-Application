{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 60px auto; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);">

    <h2 style="text-align: center; margin-bottom: 35px;">Login to Finova</h2>
    
    <form method="POST">
        {% csrf_token %}

        <input type="email" name="email" placeholder="Email" required
        style="width:100%; padding:14px; margin:12px 0; border:1px solid #ddd; border-radius:6px;">

        <input type="password" name="password" placeholder="Password" required
        style="width:100%; padding:14px; margin:12px 0; border:1px solid #ddd; border-radius:6px;">

        <button type="submit"
        style="width:100%; padding:14px; background:#28a745; color:white; border:none; border-radius:6px; font-size:17px; cursor:pointer; margin-top:15px;">
        Login
        </button>
    </form>
    
    <p style="text-align:center; margin-top:25px;">
        Don't have an account? 
        <a href="/register/" style="color:#28a745;">Register here</a>
    </p>

</div>
{% endblock %}
